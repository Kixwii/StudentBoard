version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: school_portal_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: hexpm/elixir:1.15.7-erlang-26.2.5-alpine
    ports:
      - "4000:4000"
    volumes:
      - .:/app
    working_dir: /app
    environment:
      MIX_ENV: dev
      DATABASE_URL: postgresql://postgres:postgres@db:5432/school_portal_dev
      SECRET_KEY_BASE: "development_secret_key_base_1234567890"
    depends_on:
      - db
    command: >
      sh -c "apk add --no-cache build-base git &&
             mix local.hex --force &&
             mix local.rebar --force &&
             mix deps.get &&
             mix ecto.create &&
             mix ecto.migrate &&
             mix phx.server"

volumes:
  postgres_data: